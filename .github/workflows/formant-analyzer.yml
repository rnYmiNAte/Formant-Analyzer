name: Formant Analysis

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pandas matplotlib praat-parselmouth soundfile

    - name: Run formant extraction
      run: |
        # Example: analyze all .wav files in repo or a folder
        python -c "
        import glob
        from extract_5_formants import extract_formants   # assume you committed the script
        for wav in glob.glob('audio/*.wav'):
            df = extract_formants(wav, max_formants=5, max_formant_freq=5500)
            csv = wav.replace('.wav', '_formants.csv')
            df.to_csv(csv, index=False)
            print(f'Processed {wav} → {csv}')
        "

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: formant-csv-results
        path: '**/*_formants.csv'
