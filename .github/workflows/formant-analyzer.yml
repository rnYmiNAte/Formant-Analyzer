name: Formant Analyzer (5 Formants) - Speaker Aware

on:
  push:
    paths:
      - 'audio/**'
  workflow_dispatch:
    inputs:
      input_dir:
        description: 'Input audio directory'
        required: false
        default: 'audio'
      speaker_type:
        description: 'Speaker type: auto / male / female / child'
        required: false
        default: 'auto'
      max_formant:
        description: 'Global max formant override (Hz) - leave empty for auto'
        required: false
        default: ''

jobs:
  analyze-formants:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install praat-parselmouth pandas numpy

      - name: Run Speaker-Aware 5-Formant Analyzer
        run: |
          python scripts/formant_analyzer.py \
            --input-dir ${{ github.event.inputs.input_dir || 'audio' }} \
            --speaker-type ${{ github.event.inputs.speaker_type || 'auto' }} \
            ${{ github.event.inputs.max_formant != '' && format('--max-formant {0}', github.event.inputs.max_formant) || '' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: 5-formant-results
          path: results/formants/
          retention-days: 30
